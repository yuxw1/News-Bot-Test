name: AI Daily News Bot

on:
  schedule:
    # 每天北京/新加坡时间早上 8 点运行 (UTC时间 0 点)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予把文件写回仓库的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 修复 1：把 markdown 和 pdfkit 加到安装列表里
      - name: Install dependencies
        run: pip install feedparser openai markdown pdfkit

      # 增加这一步：给云端服务器安装 PDF 引擎和中文字体
      - name: Install PDF Engine and Chinese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf fonts-wqy-microhei
          
      - name: Run Python script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python test.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # 修复 2：加上 *.pdf，让它把 PDF 文件也一起传回你的 GitHub 仓库
          git add *.md *.pdf
          git commit -m "📝 Auto-generated AI Daily News (MD & PDF)" || echo "No changes to commit"
          git push